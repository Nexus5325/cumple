<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            opacity: 0;
            transition: opacity 3.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        body.cambiar-fondo::before {
            opacity: 1;
        }

        .contenedor {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            height: 100%;
        }

        /* EL PASTEL */
        .pastel {
            position: relative;
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transform: scale(0);
            animation: aparecerPastel 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
            transition: all 0.8s ease-in-out;
        }

        .pastel.ocultar {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        .piso {
            width: 100%;
            border-radius: 12px 12px 4px 4px;
            background: #ff7096;
            position: relative;
            border: 4px solid #fff;
        }
        .piso-3 { width: 100px; height: 50px; background: #ff85a1; z-index: 3; }
        .piso-2 { width: 150px; height: 55px; background: #ff7096; z-index: 2; margin-top: -4px; }
        .piso-1 { width: 200px; height: 65px; background: #ff477e; z-index: 1; margin-top: -4px; }

        .piso::after {
            content: '';
            position: absolute;
            top: 0; left: 10px; right: 10px;
            height: 12px;
            background: #fff;
            border-radius: 0 0 8px 8px;
        }

        /* VELAS */
        .contenedor-velas {
            display: flex;
            gap: 12px;
            justify-content: center;
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            padding-bottom: 2px;
        }
        .vela {
            width: 6px;
            height: 26px;
            background: linear-gradient(to bottom, #70d6ff, #fff);
            border-radius: 3px;
            position: relative;
        }
        .flama {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 10px;
            height: 16px;
            background: radial-gradient(circle, #ffea00 40%, #ff7b00 100%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 8px #ffea00, 0 0 15px #ff7b00;
        }
        .flama.encendida {
            transform: translateX(-50%) scale(1);
            animation: parpadeo 0.2s infinite alternate ease-in-out;
        }

        /* ILUMINACIÓN */
        .aura-luz {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, rgba(255, 220, 0, 0.35) 0%, rgba(255, 130, 0, 0.05) 50%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 1;
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease-out;
        }
        .aura-luz.nivel-1 { transform: scale(35); opacity: 0.65; }
        .aura-luz.nivel-2 { transform: scale(60); opacity: 0.85; }
        .aura-luz.nivel-3 { 
            transform: scale(95); 
            opacity: 1;
            background: radial-gradient(circle, rgba(255, 230, 50, 0.45) 0%, rgba(255, 100, 0, 0.1) 60%, rgba(0,0,0,0) 75%);
        }

        /* BOTÓN INTERACTIVO */
        .btn-soplar {
            background: #ff477e;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 71, 126, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            z-index: 10;
            margin-top: 45px;
        }
        .btn-soplar.mostrar {
            opacity: 1;
            transform: translateY(0);
        }
        .btn-soplar:hover {
            background: #ff5c8a;
            transform: scale(1.05);
        }

        /* --- MECÁNICA DEL SOBRE DE CARTA --- */
        .wrapper-carta {
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
            perspective: 1000px;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }
        
        .sobre {
            position: relative;
            width: 320px;
            height: 200px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            transform: translateY(100px);
            opacity: 0;
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }
        
        .sobre.aparecer {
            opacity: 1;
            transform: translateY(0);
        }

        .sobre-fondo-real {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fbb1bd;
            border-radius: 0 0 8px 8px;
            z-index: 1;
        }

        .sobre-frente-izq {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 160px solid #f9bec7;
            border-top: 100px solid transparent;
            border-bottom: 100px solid #f9bec7;
            border-right: 160px solid transparent;
            z-index: 3;
            pointer-events: none;
        }

        .sobre-frente-der {
            position: absolute;
            bottom: 0; right: 0;
            width: 0; height: 0;
            border-right: 160px solid #f9bec7;
            border-top: 100px solid transparent;
            border-bottom: 100px solid #f9bec7;
            border-left: 160px solid transparent;
            z-index: 3;
            pointer-events: none;
        }

        .solapa {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 110px solid #ff85a1;
            transform-origin: top center;
            transition: transform 0.6s ease-in-out, z-index 0.3s;
            z-index: 4;
            transform: rotateX(0deg);
            backface-visibility: hidden;
        }
        
        .sobre.abierto .solapa {
            transform: rotateX(180deg);
            z-index: 1; 
        }

        /* LA CARTA */
        .carta {
            position: absolute;
            left: 50%; 
            bottom: 10px;
            width: 290px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            transform: translateX(-50%) scale(0.2); 
            transform-origin: bottom center;
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s, z-index 0.5s;
            z-index: 2;
        }

        .sobre.abierto .carta {
            transform: translateX(-50%) translateY(-120px) scale(1.15);
            z-index: 5; 
            box-shadow: 0 20px 45px rgba(0,0,0,0.25);
        }

        .carta img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* CONTENEDOR DE LETRAS ACTUALIZADO (MÁS GRANDE, MÁS ARRIBA, APTO PARA ANIMAR DISOLUCIÓN) */
        .letras-cancion {
            position: fixed;
            bottom: 120px; /* 💡 Subido sustancialmente */
            left: 50%;
            transform: translateX(-50%);
            color: #d31d4e;
            font-size: 1.5rem; /* 💡 Letra más grande y legible */
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 0px #fff;
            width: 85%;
            max-width: 440px;
            line-height: 1.4;
            z-index: 10;
            opacity: 0; /* Controlado dinámicamente por la animación lenta en JS */
            transition: opacity 0.6s ease-in-out; /* 💡 Transición de disolución lenta */
            pointer-events: none;
            display: none;
        }
        
        .letras-cancion.mostrar-letras {
            display: block;
        }
        
        /* Clase de apoyo para la animación de opacidad */
        .letras-cancion.visible {
            opacity: 1;
        }

        /* CONFETI */
        .confetti {
            position: absolute;
            top: -20px;
            z-index: 1;
            opacity: 0;
            animation: caer linear forwards;
        }
        
        @keyframes caer {
            0% { opacity: 0; transform: translateY(0) rotate(0deg); }
            15% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(105vh) rotate(720deg); }
        }

        @keyframes aparecerPastel {
            0% { transform: scale(0) translateY(40px); }
            100% { transform: scale(1) translateY(0); }
        }
        @keyframes parpadeo {
            0% { transform: translateX(-50%) scale(1) skewX(-3deg); }
            100% { transform: translateX(-50%) scale(1.08) skewX(3deg); }
        }
    </style>
</head>
<body>

    <audio id="musica-skz" src="./I%20like%20it.mp3" preload="auto" loop></audio>

    <div class="aura-luz" id="aura"></div>

    <div class="contenedor">
        
        <div class="pastel" id="el-pastel">
            <div class="piso piso-3">
                <div class="contenedor-velas">
                    <div class="vela"><div class="flama" id="flama1"></div></div>
                    <div class="vela"><div class="flama" id="flama2"></div></div>
                    <div class="vela"><div class="flama" id="flama3"></div></div>
                </div>
            </div>
            <div class="piso piso-2"></div>
            <div class="piso piso-1"></div>
        </div>

        <button class="btn-soplar" id="btn-soplar" onclick="soplarVelas()">¡Sopla las velas! 🎂💨</button>
    </div>

    <div class="wrapper-carta" id="wrapper-carta">
        <div class="sobre" id="el-sobre">
            <div class="sobre-fondo-real"></div>
            <div class="solapa"></div>
            <div class="carta">
                <img src="./FotoAmiga.jpg" alt="Sorpresa Especial" onerror="this.src='FotoAmiga.jpg'">
            </div>
            <div class="sobre-frente-izq"></div>
            <div class="sobre-frente-der"></div>
        </div>
    </div>

    <div class="letras-cancion" id="caja-letras"></div>

    <script>
        const aura = document.getElementById('aura');
        const btnSoplar = document.getElementById('btn-soplar');
        const musica = document.getElementById('musica-skz');
        const pastel = document.getElementById('el-pastel');
        const wrapperCarta = document.getElementById('wrapper-carta');
        const sobre = document.getElementById('el-sobre');
        const cajaLetras = document.getElementById('caja-letras');

        // Estado interno para evitar parpadeos caóticos de la animación lenta
        let ultimoTexto = "";

        // Secuencia inicial de encendido
        setTimeout(() => {
            document.getElementById('flama1').classList.add('encendida');
            aura.classList.add('nivel-1');
        }, 1500);

        setTimeout(() => {
            document.getElementById('flama2').classList.add('encendida');
            aura.classList.remove('nivel-1');
            aura.classList.add('nivel-2');
        }, 1900);

        setTimeout(() => {
            document.getElementById('flama3').classList.add('encendida');
            aura.classList.remove('nivel-2');
            aura.classList.add('nivel-3');
        }, 2300);

        setTimeout(() => {
            btnSoplar.classList.add('mostrar');
        }, 3200);

        function soplarVelas() {
            document.getElementById('flama1').classList.remove('encendida');
            document.getElementById('flama2').classList.remove('encendida');
            document.getElementById('flama3').classList.remove('encendida');
            
            btnSoplar.style.display = 'none';
            aura.style.opacity = '0';

            musica.volume = 0.25;
            musica.play().catch(e => console.log("Audio activado"));

            document.body.classList.add('cambiar-fondo');

            lanzarConfeti();
            setInterval(lanzarConfeti, 1200);

            setTimeout(() => {
                pastel.classList.add('ocultar');
            }, 800);

            setTimeout(() => {
                wrapperCarta.style.display = 'flex';
                setTimeout(() => {
                    sobre.classList.add('aparecer');
                    cajaLetras.classList.add('mostrar-letras');
                }, 50);
            }, 1600);

            setTimeout(() => {
                sobre.classList.add('abierto');
            }, 3000);
        }

        // FUNCIÓN CONTROLADORA PARA LA ANIMACIÓN LENTA DEL KARAOKE
        function actualizarTextoConTransicion(nuevoTexto) {
            if (ultimoTexto === nuevoTexto) return;
            ultimoTexto = nuevoTexto;

            if (nuevoTexto === "") {
                cajaLetras.classList.remove('visible');
            } else {
                // Si ya había texto, hacemos un desvanecimiento rápido de salida antes de meter el nuevo
                if (cajaLetras.classList.contains('visible')) {
                    cajaLetras.classList.remove('visible');
                    setTimeout(() => {
                        cajaLetras.innerHTML = nuevoTexto;
                        cajaLetras.classList.add('visible');
                    }, 400); // Pequeño margen para la transición
                } else {
                    cajaLetras.innerHTML = nuevoTexto;
                    cajaLetras.classList.add('visible');
                }
            }
        }

        // MOTOR DE LETRAS ACOPLADO A LA ANIMACIÓN LENTA
        musica.addEventListener('timeupdate', () => {
            const tiempo = musica.currentTime;

            if (tiempo >= 0.5 && tiempo < 4.5) {
                actualizarTextoConTransicion("🎵 I like it, yeah I like it... 🎵");
            } else if (tiempo >= 4.5 && tiempo < 8.5) {
                actualizarTextoConTransicion("✨ ¡Feliz cumpleaños atrasado! ✨");
            } else if (tiempo >= 8.5 && tiempo < 13.0) {
                actualizarTextoConTransicion("🥳 Mi calendario falló,<br>pero jamás mi memoria emocional 🥳");
            } else if (tiempo >= 13.0 && tiempo < 17.5) {
                actualizarTextoConTransicion("🎶 Eres la persona más S-Class de todo mi mundo 🎶");
            } else if (tiempo >= 17.5 && tiempo < 22.0) {
                actualizarTextoConTransicion("🫶 Gracias por ser una amiga tan genial y aguantar mis despistes 🫶");
            } else if (tiempo >= 22.0) {
                actualizarTextoConTransicion("⭐ ¡A celebrar otra vez! ⭐");
            } else {
                actualizarTextoConTransicion("");
            }
        });

        function lanzarConfeti() {
            const colores = ['#ff0055', '#ff5080', '#ff00aa', '#3a86ff', '#ffbe0b', '#fb5607', '#00f5d4'];
            const fragmentos = 20; 

            for (let i = 0; i < fragmentos; i++) {
                const elemento = document.createElement('div');
                elemento.classList.add('confetti');
                
                elemento.style.left = Math.random() * 100 + 'vw';
                elemento.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
                
                const ancho = Math.random() * 8 + 14;
                elemento.style.width = ancho + 'px';
                elemento.style.height = (Math.random() > 0.4 ? ancho : ancho * 0.6) + 'px'; 
                
                elemento.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                elemento.style.animationDuration = Math.random() * 2 + 3.5 + 's';
                elemento.style.animationDelay = Math.random() * 0.4 + 's';

                document.body.appendChild(elemento);
                
                setTimeout(() => elemento.remove(), 5000);
            }
        }
    </script>
</body>
</html>
